<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NoteLib - Создать заметку</title>
  <link rel="stylesheet" href="style/notes.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>NoteLib</h1>
      <p>Создайте новую заметку</p>
    </header>

    <form class="note-form" id="noteForm">
      <input
        type="text"
        class="note-input"
        id="noteInput"
        placeholder="О чем напомнить..."
        autocomplete="off"
        required
      />
      <button type="submit" class="add-btn">Добавить</button>
    </form>
    
    <!-- Модальное окно для создания заметки -->
    <div id="noteModal" class="modal" style="display: none;">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Создать напоминание</h2>
          <span class="close">&times;</span>
        </div>
        <div class="modal-body">
          <p><strong>Название:</strong> <span id="modalNoteTitle"></span></p>
          
          <div class="form-group">
            <label for="reminderDate">Дата напоминания:</label>
            <input type="date" id="reminderDate" class="form-control">
          </div>
          
          <div class="form-group">
            <label for="reminderTime">Время напоминания:</label>
            <input type="time" id="reminderTime" class="form-control">
          </div>
          
          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" id="emailReminder">
              <span class="checkmark"></span>
              Напомнить на почту
            </label>
          </div>
          
          <div class="form-group" id="emailField" style="display: none;">
            <label for="email">Email:</label>
            <input type="email" id="email" class="form-control" placeholder="Введите email">
          </div>
          
          <div class="modal-footer">
            <button id="createNoteBtn" class="btn btn-primary">Создать</button>
            <button id="cancelBtn" class="btn btn-secondary">Отмена</button>
          </div>
        </div>
      </div>
    </div>
    
    <div class="notes-section">
      <h2>Все заметки</h2>
      <div class="notes-grid" id="notesList">
        <!-- Сами заметки -->
      </div>
    </div>
  </div>
</body>
<script src="/app.js"></script>
</html>
